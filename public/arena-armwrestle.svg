<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
    <rect width="1000" height="800" fill="#02040A"/>

    <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
        <path d="M 50,0 L 0,0 L 0,50" fill="none" stroke="#1A2B4C" stroke-width="1" opacity="0.15"/>
    </pattern>
    <rect width="1000" height="800" fill="url(#grid)"/>
    <defs>
        <filter id="neon-cyan" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="neon-orange" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="core-flash" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="20" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <filter id="drop-shadow" x="-20%" y="-20%" width="150%" height="150%">
            <feDropShadow dx="15" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.8"/>
        </filter>
        <pattern id="speckles" width="60" height="60" patternUnits="userSpaceOnUse">
            <circle cx="10" cy="10" r="2.5" fill="#000000" opacity="0.4"/>
            <circle cx="30" cy="40" r="4" fill="#000000" opacity="0.3"/>
            <circle cx="50" cy="20" r="1.5" fill="#000000" opacity="0.5"/>
            <circle cx="20" cy="50" r="3" fill="#000000" opacity="0.2"/>
            <circle cx="45" cy="55" r="2" fill="#000000" opacity="0.4"/>
            <circle cx="5" cy="35" r="1" fill="#FFFFFF" opacity="0.1"/>
            <circle cx="40" cy="15" r="1.5" fill="#FFFFFF" opacity="0.1"/>
        </pattern>
        <radialGradient id="vol-cyan" cx="20%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#00AEEF"/>
            <stop offset="40%" stop-color="#022B42"/>
            <stop offset="85%" stop-color="#010A14"/>
            <stop offset="100%" stop-color="#000000"/>
        </radialGradient>

        <radialGradient id="vol-orange" cx="20%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#FF6600"/>
            <stop offset="40%" stop-color="#4A1C04"/>
            <stop offset="85%" stop-color="#1A0500"/>
            <stop offset="100%" stop-color="#000000"/>
        </radialGradient>
        <path id="forearm" d="
            M -80,300
            C -120,200 -100,100 -50,50
            L -80,40 L -40,10 L -60,-20 L -20,-30 L -30,-70 L 10,-60
            C 50,-80 100,-80 150,-40
            L 120,60 C 80,150 40,250 -80,300 Z" />
        <path id="crusher-dome" d="
            M 0,0
            C -250,-100 -200,-500 50,-550
            C 200,-580 300,-400 280,-250
            C 270,-150 200,-50 150,0
            Z" />
        <path id="crusher-teeth" d="
            M 280,-250
            A 30,30 0 0,1 250,-200
            A 25,25 0 0,0 230,-150
            A 35,35 0 0,1 180,-100
            A 20,20 0 0,0 150,0
            L 200,-50 L 270,-150 Z" />
        <path id="crusher-thumb" d="
            M 150,0
            C 250,-10 320,-50 380,-120
            C 420,-170 420,-220 380,-250
            C 340,-200 300,-150 250,-130
            C 200,-110 170,-40 150,0 Z" />
    </defs>
    <ellipse cx="500" cy="400" rx="400" ry="300" fill="#00AEEF" opacity="0.03" filter="url(#neon-cyan)"/>
    <ellipse cx="500" cy="400" rx="300" ry="200" fill="#FF6600" opacity="0.03" filter="url(#neon-orange)"/>
    <g transform="translate(500, 450)">
        <g transform="scale(-1, 1) translate(-100, 100) rotate(15)" filter="url(#drop-shadow)">
            <use href="#forearm" fill="url(#vol-orange)" stroke="#FF6600" stroke-width="3"/>
            <use href="#forearm" fill="url(#speckles)"/>
            <path d="M -50,50 C -100,100 -120,200 -80,300" fill="none" stroke="#FF6600" stroke-width="8" filter="url(#neon-orange)"/>

            <use href="#crusher-dome" fill="url(#vol-orange)" stroke="#FF6600" stroke-width="4"/>
            <use href="#crusher-dome" fill="url(#speckles)"/>
            <use href="#crusher-teeth" fill="#1A0500" stroke="#FF6600" stroke-width="3"/>

            <path d="M 0,0 C -250,-100 -200,-500 50,-550" fill="none" stroke="#FF6600" stroke-width="6" opacity="0.8" filter="url(#neon-orange)"/>
        </g>
        <g transform="translate(-100, 100) rotate(15)" filter="url(#drop-shadow)">
            <use href="#forearm" fill="url(#vol-cyan)" stroke="#00AEEF" stroke-width="3"/>
            <use href="#forearm" fill="url(#speckles)"/>
            <path d="M -50,50 C -100,100 -120,200 -80,300" fill="none" stroke="#00AEEF" stroke-width="8" filter="url(#neon-cyan)"/>

            <use href="#crusher-dome" fill="url(#vol-cyan)" stroke="#00AEEF" stroke-width="4"/>
            <use href="#crusher-dome" fill="url(#speckles)"/>
            <use href="#crusher-teeth" fill="#010A14" stroke="#00AEEF" stroke-width="3"/>

            <path d="M 0,0 C -250,-100 -200,-500 50,-550" fill="none" stroke="#00AEEF" stroke-width="6" opacity="0.8" filter="url(#neon-cyan)"/>
        </g>
        <g transform="scale(-1, 1) translate(-100, 100) rotate(15)">
            <use href="#crusher-thumb" fill="url(#vol-orange)" stroke="#FF6600" stroke-width="4"/>
            <use href="#crusher-thumb" fill="url(#speckles)"/>
            <path d="M 150,0 C 250,-10 320,-50 380,-120 C 420,-170 420,-220 380,-250" fill="none" stroke="#FF6600" stroke-width="5" filter="url(#neon-orange)"/>
        </g>
        <g transform="translate(-100, 100) rotate(15)" filter="url(#drop-shadow)">
            <use href="#crusher-thumb" fill="url(#vol-cyan)" stroke="#00AEEF" stroke-width="4"/>
            <use href="#crusher-thumb" fill="url(#speckles)"/>
            <path d="M 150,0 C 250,-10 320,-50 380,-120 C 420,-170 420,-220 380,-250" fill="none" stroke="#00AEEF" stroke-width="5" filter="url(#neon-cyan)"/>
        </g>
        <g transform="translate(0, -180)">
            <circle cx="0" cy="0" r="50" fill="#FFFFFF" filter="url(#core-flash)"/>
            <circle cx="0" cy="0" r="20" fill="#FFFFFF"/>

            <ellipse cx="0" cy="0" rx="120" ry="30" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.6" filter="url(#core-flash)"/>
            <ellipse cx="0" cy="0" rx="200" ry="10" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
            <g stroke-width="4" stroke-linecap="round">
                <line x1="-30" y1="-20" x2="-150" y2="-80" stroke="#00AEEF" filter="url(#neon-cyan)"/>
                <line x1="-20" y1="20" x2="-120" y2="100" stroke="#00AEEF" filter="url(#neon-cyan)"/>
                <line x1="-40" y1="0" x2="-180" y2="-10" stroke="#00AEEF" filter="url(#neon-cyan)"/>

                <line x1="30" y1="-20" x2="150" y2="-80" stroke="#FF6600" filter="url(#neon-orange)"/>
                <line x1="20" y1="20" x2="120" y2="100" stroke="#FF6600" filter="url(#neon-orange)"/>
                <line x1="40" y1="0" x2="180" y2="-10" stroke="#FF6600" filter="url(#neon-orange)"/>
            </g>
        </g>
    </g>
    <text x="500" y="740" font-family="system-ui, -apple-system, Impact, sans-serif" font-size="72" font-weight="900" text-anchor="middle" letter-spacing="14">
        <tspan fill="#00AEEF" filter="url(#neon-cyan)">SIGNAL</tspan><tspan fill="#FF6600" filter="url(#neon-orange)">POT</tspan>
    </text>
    <line x1="350" y1="760" x2="650" y2="760" stroke="#FFFFFF" stroke-width="2" opacity="0.2"/>
</svg>
